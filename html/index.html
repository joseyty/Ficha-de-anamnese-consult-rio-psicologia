<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/index.css">
    <title>Document</title>
</head>
<body>


 <form action="" id="myForm">
  <div class="form">
    <h1>Ficha de Anamnese</h1>
    
    <!-- Informações Pessoais -->
    <div class="linha1">
      <div class="one">
        <label class="required" for="name">Nome:</label>
        <input type="text" id="name" name="name">
      </div>
    </div>

    <div class="linha2">
      <div class="two">
        <label class="required" for="idade">Idade:</label>
        <input type="number" id="idade" name="idade">
      </div>
    </div>

    <div class="linha3">
      <div class="tre">
        <label class="required" for="genero">Gênero:</label>
        <select id="genero" name="genero">
          <option value="">Selecione...</option>
          <option value="masculino">Masculino</option>
          <option value="feminino">Feminino</option>
          <option value="outro">Outro</option>
        </select>
      </div>
    </div>

    <!-- Contato -->
    <div class="linha4">
      <div class="four">
        <label class="required" for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone">
      </div>
    </div>

    <div class="linha5">
      <div class="five">
        <label class="required" for="email">Email:</label>
        <input type="email" id="email" name="email">
      </div>
    </div>

    <!-- Documentação -->
    <div class="linha6">
      <div class="six">
        <label class="required" for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf">
      </div>
    </div>

    <div class="linha7">
      <div class="seven">
        <label class="required" for="rg">RG:</label>
        <input type="text" id="rg" name="rg">
      </div>
    </div>

    <!-- Dados Civis e Profissionais -->
    <div class="linha8">
      <div class="eight">
        <label class="required" for="estadoCivil">Estado Civil:</label>
        <select id="estadoCivil" name="estadoCivil">
          <option value="">Selecione...</option>
          <option value="solteiro">Solteiro</option>
          <option value="casado">Casado</option>
          <option value="divorciado">Divorciado</option>
          <option value="viuvo">Viúvo</option>
        </select>
      </div>
    </div>

    <div class="linha9">
      <div class="nine">
        <label class="required" for="profissao">Profissão:</label>
        <input type="text" id="profissao" name="profissao">
      </div>
    </div>

    <!-- Administrativo -->
    <div class="linha10">
      <div class="ten">
        <label class="required" for="data">Data de Nascimento:</label>
        <input type="date" id="data" name="data">
      </div>
    </div>

    <div class="linha11">
      <div class="one">
        <label class="required" for="responsavel">Responsável:</label>
        <input type="text" id="responsavel" name="responsavel">
      </div>
    </div>  


<div class="linha12">
  <div class="tween">
    <label class="required" for="endereco">Endereço:</label>
    <input type="text" id="endereco" name="endereco">
  </div>
</div>

<div class="bloco1">       
  

<p class="required">Motivo da Consulta:</p>
<textarea name="motivoconsulta"  id="motivoConsulta" placeholder="Escreva aqui..."></textarea>

<p class="required">Histórico Emocional:</p>
<textarea name="historicoemocional" id="historicoEmocional" placeholder="Escreva aqui..."></textarea>

<p class="required">Estado emocional atual:</p>
<textarea name="estadoemocional" id="estadoEmocional" placeholder="Escreva aqui..."></textarea>

<p class="required">Habitos:</p>
<textarea name="Habitoss" id="Habitos" placeholder="Escreva aqui..."></textarea>

<p class="required">Histórico:</p>
<textarea name="historico" id="historico" placeholder="Escreva aqui..."></textarea>
<br>
<input type="checkbox" id="termos" name="termos">
<label for="termos" class="required">Li e concordo com o uso das informações fornecidas</label>
<br>



</div>


     <div id="mensagem"></div>

   <br>
  <button id="btnadicionarButton" onclick="adicionarButton()" type="button">Enviar</button>

  </div>
 </form>
  <script src="../js/index.js"></script>
</body>
</html>
